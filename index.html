[
{id:86,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'Prevention, relief, reduction, or soothing of symptoms of a disease state describes which type of care?',opts:['Curative care','Palliative care','Rehabilitative care','Preventive care'],ans:1,explain:'Palliative care = prevention, relief, reduction, or soothing of symptoms WITHOUT affecting a cure. This is the core definition. (EAQ Ch.25)'},
{id:87,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A 4-year-old child tragically loses a parent. Which thought about the death is the child MOST LIKELY to have?',opts:['Death is permanent and the parent will not return','The parent is asleep and will wake up','Death is contagious','The child is angry at the parent for leaving'],ans:1,explain:'Preschoolers believe death is like sleep — temporary and reversible. NEVER describe death as sleep — the child may fear sleeping. Use simple, truthful language. (EAQ Ch.25 / Table 15.3)'},
{id:88,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A dying patient wants to make a deathbed confession. Which religious community does the patient most likely belong to?',opts:['Catholics','Muslims','Jews','Protestants'],ans:2,explain:'Jews practice deathbed confession (Vidui) — an important spiritual ritual requesting forgiveness before death. Cultural and religious competency is essential in EOL care. (EAQ Ch.25)'},
{id:89,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A terminally ill patient on lifesaving medications wishes to die at home. How should the nurse manage this?',opts:['Convince the patient to stay in hospital for safety','Respect the patient&#39;s desire and support discharge home','Ask the physician to override the patient&#39;s wishes','Refer to ethics committee before discharge'],ans:1,explain:'Patient autonomy is fundamental. A competent patient has the right to choose their care setting including dying at home. (EAQ Ch.25)'},
{id:90,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A 6-year-old child of a dying mother may believe which about the death?',opts:['Death is permanent and irreversible','Death only happens to old people','Wishes or bad thoughts can be responsible for death','Death means going to heaven'],ans:2,explain:'School-age magical thinking — they may believe wishing something bad caused the death, causing intense guilt. Reassure the child they are NOT responsible. (EAQ Ch.25 / Table 15.3)'},
{id:91,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A pregnant woman who lost her spouse shows which behavior indicating she is accepting the loss?',opts:['Refusing to discuss the loss','Expressing thoughts related to the loss','Isolating herself from family','Denying the death occurred'],ans:1,explain:'Expressing thoughts related to the loss is a sign of active grief work and acceptance — processing the loss rather than denying it. (EAQ Ch.25)'},
{id:92,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'To support a terminally ill patient on life-support, which action supports patient rights?',opts:['Remove all life support without physician order','Maintain all supportive measures regardless of wishes','Treat the body respectfully after death','Override the patient&#39;s DNR'],ans:2,explain:'Supporting patient rights includes treating the body with dignity and respect after death — acknowledging the patient&#39;s humanity even after life ends. (EAQ Ch.25)'},
{id:93,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A cancer patient refuses to accept the diagnosis and denies the conversation happened. Which grief stage is this?',opts:['Anger','Bargaining','Denial','Depression'],ans:2,explain:'DENIAL — Stage 1: refusing to accept the reality of the terminal diagnosis. The initial shock response. (EAQ Ch.25)'},
{id:94,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A charge nurse preparing a grief/loss inservice. Which essential concept must be included?',opts:['All people grieve the same way','Grief follows a predictable 5-stage order for everyone','Individuals perceive loss differently','Grief resolves completely within 12 months'],ans:2,explain:'"Individuals perceive loss differently." This is the fundamental principle — no two people grieve identically. (EAQ Ch.25)'},
{id:95,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'Which statement would a 75-year-old man be EXPECTED to make about death?',opts:['"I am terrified of dying."','"After death I can see my deceased father."','"Death means I will no longer exist."','"I don&#39;t believe in any afterlife."'],ans:1,explain:'Older adults often view death as a reunion with loved ones already passed — a source of hope and comfort. This reflects the spiritual aspect of aging. (EAQ Ch.25)'},
{id:96,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'An inquest is ordered after a patient dies in a motor vehicle accident. Who conducts the inquest?',opts:['Attending physician','Hospital administrator','Coroner','Social worker'],ans:2,explain:'A coroner (or medical examiner) conducts an inquest — a formal legal inquiry into sudden, violent, or unexpected death. (EAQ Ch.25)'},
{id:97,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'If a terminally ill patient dies, which team member is responsible for informing the family?',opts:['The charge nurse','The social worker','The health care provider (physician)','The chaplain'],ans:2,explain:'The health care provider (physician) is responsible for informing the family of the patient&#39;s death. The nurse supports the family afterward. (EAQ Ch.25)'},
{id:98,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'Worden&#39;s behavioral theory tasks are in which CORRECT sequence?',opts:['Work through pain then accept reality then adjust then relocate','Accept the reality of loss then work through pain then adjust to environment then relocate emotionally','Adjust to environment then accept reality then relocate then work through pain','Relocate deceased then work through pain then accept reality then adjust'],ans:1,explain:'Worden&#39;s 4 tasks: (1) Accept reality of loss, (2) Work through pain/grief, (3) Adjust to environment without deceased, (4) Relocate deceased and emotionally move on. (EAQ Ch.25)'},
{id:99,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A patient can conceptualize death as the inevitable end of life. What is the YOUNGEST likely age?',opts:['5','7','9','12'],ans:2,explain:'By approximately age 9 (late concrete operational stage), children develop the ability to understand death as inevitable, universal, and permanent. (EAQ Ch.25)'},
{id:100,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'Teaching family to interact with a dying patient includes which? (Select ALL that apply)',opts:['Listening attentively to the patient','Discussing family problems with the patient','Conversing about normal family activities','Maintaining complete silence at all times'],ans:[0,1,2],multi:true,explain:'Listen attentively, discuss family matters (keeps patient connected), and converse normally (maintains dignity). Silence isolates the patient — it is non-therapeutic. (EAQ Ch.25)'},
{id:101,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A terminally ill patient in the final stages is incontinent. Which nursing intervention addresses skin breakdown?',opts:['Change pads every 4 hours only','Insert a catheter or condom catheter','Apply moisture barrier cream and wait 24 hours','Restrict fluid intake to reduce incontinence'],ans:1,explain:'Inserting a catheter or condom catheter prevents skin breakdown from urinary incontinence. Skin integrity is a priority comfort measure in EOL care. (EAQ Ch.25)'},
{id:102,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'Postmortem care for a patient with AIDS — which intervention is ESSENTIAL to protect those handling the body?',opts:['Standard precautions only','Attach a special label for contagious disease to the body','Notify only the funeral home of the diagnosis','Double-bag belongings without labeling'],ans:1,explain:'A special contagious disease label alerts all personnel to use appropriate precautions. This protects everyone who handles the body after death. (EAQ Ch.25)'},
{id:103,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A cancer patient with failing vision cannot read scriptures. Which action BEST meets the spiritual needs?',opts:['Refer only to chaplain','Offer to read the scripture for the patient','Provide audio recordings and leave','Tell the patient to ask family members'],ans:1,explain:'Offering to read scripture demonstrates therapeutic presence and addresses the SPIRITUAL aspect of human functioning. (EAQ Ch.25)'},
{id:104,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'Which documentation indicates the pain goal has been ACHIEVED?',opts:['Nurse observes no facial grimacing','Patient requests pain medication every 2 hours','Patient reports that pain has decreased from 9 to 4 after pain medication','Vital signs are within normal range'],ans:2,explain:'Patient self-report of decreased pain (9 to 4) is the gold standard. Always prioritize patient self-report over nurse observation. (EAQ Ch.25)'},
{id:105,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A patient near death has dwindling verbal communication. Which technique is MOST helpful?',opts:['Reading scripture regardless of preference','Holding the person&#39;s hand','Asking detailed life history questions','Explaining all procedures thoroughly'],ans:1,explain:'Holding the person&#39;s hand is the most therapeutic non-verbal communication when verbal communication dwindles — conveying presence and connection without words. Hearing is the LAST sense lost. (EAQ Ch.25)'},
{id:106,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A young terminal mother is distressed she won&#39;t see her children grow up. Which intervention BEST helps her cope?',opts:['Tell her to focus on remaining treatment','Encourage her to write letters and make videos for the children','Suggest adoption planning','Ask family to manage all parenting discussions'],ans:1,explain:'Writing letters and making videos gives the mother a meaningful way to maintain her maternal role, create a legacy, and provide future comfort for her children. (EAQ Ch.25)'},
{id:107,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'How should the nurse position the body during postmortem care on an elderly patient?',opts:['Side-lying with arms tucked','Supine with palms down','Semi-Fowler&#39;s position','Prone position'],ans:1,explain:'Standard postmortem position: SUPINE with palms down. A pillow under the head prevents facial discoloration. The body should look as natural as possible for family viewing. (EAQ Ch.25)'},
{id:108,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A widowed patient at a 2-week follow-up shows which behavior indicating resolution of complicated grief?',opts:['Continuing to avoid all social interactions','Requesting more individual therapy','Admitting to attending a grief support group','Asking about antidepressants'],ans:2,explain:'Attending a grief support group shows active engagement in grief work — a positive sign of movement toward resolution. Social engagement is therapeutic. (EAQ Ch.25)'},
{id:109,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'When caring for a terminally ill patient whose condition is consistently changing, which nursing action is BEST?',opts:['Follow the original care plan strictly','Shift priorities according to the patient&#39;s current condition','Consult ethics committee for every change','Ask family to set daily priorities'],ans:1,explain:'Terminal patients&#39; conditions change rapidly. The nurse must continuously reassess and shift priorities according to the CURRENT condition — individualized, patient-centered EOL care. (EAQ Ch.25)'},
{id:110,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'Which intervention comes FIRST for a terminal cancer patient experiencing nausea and vomiting?',opts:['NPO status','Antiemetics','IV fluid replacement','Dietary consultation'],ans:1,explain:'Antiemetics are the first-line pharmacological intervention for nausea/vomiting in terminal illness. Comfort and symptom management is the priority. (EAQ Ch.25)'},
{id:111,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'The health care provider orders withdrawal of feeding tubes, life support, and medications for a terminal patient. Which patient action justifies this?',opts:['Request for active euthanasia','Request for assisted suicide','The wish for passive euthanasia','Voluntary cessation of eating'],ans:2,explain:'Passive euthanasia = withholding or withdrawing life-sustaining treatments to allow natural death. DIFFERENT from active euthanasia (deliberately causing death) and assisted suicide. (EAQ Ch.25)'},
{id:112,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'Which patient behavior shows achievement of the goal to actively participate in grief work?',opts:['Patient sleeps 16+ hours per day','Patient refuses all visitors','Nurse observes patient discussing loss with significant other','Patient requests increased pain medications'],ans:2,explain:'Discussing loss with a significant other demonstrates ACTIVE participation in grief work — processing emotions, social engagement, completing grief tasks. (EAQ Ch.25)'},
{id:113,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'Which vital signs indicate end of life is IMMINENT?',opts:['Elevated BP with bounding pulse','Slow, weak, thready pulse; lowered BP; rapid, shallow, irregular respirations','Bradycardia with hypertension and deep respirations','Tachycardia with normal blood pressure'],ans:1,explain:'Imminent death: slow, weak, thready pulse; falling BP; rapid, shallow, irregular respirations — reflecting cardiovascular and respiratory failure. (EAQ Ch.25 / Slide 14)'},
{id:114,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'Which intervention BEST demonstrates attentiveness to a dying patient?',opts:['Standing at the doorway to give space','Sitting in a chair close to the bed, facing the patient','Conducting assessments quickly','Visiting briefly every 2 hours'],ans:1,explain:'Sitting close to the bed, facing the patient = full therapeutic presence. Unhurried attention, eye contact, physical proximity. (EAQ Ch.25)'},
{id:115,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'Which intervention reduces discoloration of a deceased patient&#39;s face?',opts:['Apply makeup','Dim the room lighting','Place a pillow under the patient&#39;s head','Elevate the foot of the bed'],ans:2,explain:'Placing a pillow under the patient&#39;s head after death prevents blood pooling and facial discoloration — part of proper postmortem positioning. (EAQ Ch.25)'},
{id:116,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A 9-year-old has great difficulty coping with death. Which intervention MOST helps?',opts:['Explain death using medical terminology','Enroll in adult grief counseling','Allow the child to express feelings and thoughts via play','Keep the child away from all death discussions'],ans:2,explain:'Play therapy is developmentally appropriate for school-age children. Children process complex emotions through play, art, and storytelling. (EAQ Ch.25)'},
{id:117,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A DNR patient&#39;s adult child asks to remove the NG tube and stop all medications. How should the nurse respond?',opts:['"I will contact the physician to do this right away."','"That is within your rights as next of kin."','"DNR does not mean to withhold nutrition or medications."','"We need a family meeting before deciding."'],ans:2,explain:'CRITICAL: "DNR does not mean to withhold nutrition or medications." DNR ONLY addresses CPR. Comfort care and medications continue unless there is a SEPARATE order to withhold them. (EAQ Ch.25)'},
{id:118,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'An elderly man is depressed over losing his hair at an alarming rate. Which type of loss is this?',opts:['Situational loss','Actual loss','Maturational loss','Psychological loss'],ans:2,explain:'Maturational loss = expected losses associated with normal aging. Hair loss due to aging is a maturational loss — expected but still requiring acknowledgment and support. (EAQ Ch.25)'},
{id:119,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'Which nursing documentation indicates that death may be imminent?',opts:['Patient reports increased pain','Blood pressure is 160/90','Pupils are dilated and fixed','Patient is anxious and restless'],ans:2,explain:'"Pupils are dilated and fixed" = clinical sign of imminent death, indicating loss of brain stem reflexes. (EAQ Ch.25 / Slides 14 and 15)'},
{id:120,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A DNR patient in last stage of metastasis has acute pain. Which intervention will the nurse perform?',opts:['Withhold all medications — patient has a DNR','Wait for physician to reassess','Administer pain control medication','Ask family permission before giving anything'],ans:2,explain:'DNR only means no CPR — patients STILL receive ALL other care including pain medications. Undertreating pain in a DNR patient is unethical. (EAQ Ch.25)'},
{id:121,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A 72-year-old terminal prostate cancer patient has weakness, anxiety, anorexia, and severe pain. Which nursing goals are IDEAL? (Select ALL that apply)',opts:['Control pain','Ensure safety','Relieve anxiety','Provide adequate nutrition and hydration'],ans:[0,1,2,3],multi:true,explain:'All four are appropriate goals: pain control (#1 priority), safety, anxiety relief, and nutrition/hydration (comfort-focused). (EAQ Ch.25)'},
{id:122,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'The MOST reasonable goal for a patient with complicated grief is:',opts:['Return to pre-loss functioning within 3 months','Establish new and meaningful relationships and interests','Suppress grief to return to work quickly','Avoid all grief-triggering situations'],ans:1,explain:'Establishing new and meaningful relationships and interests reflects healthy adaptation — integrating the loss, not eliminating grief. The hallmark of complicated grief resolution. (EAQ Ch.25)'},
{id:123,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A patient says: "If I had taken my father to the oncologist earlier, he would not have died." According to Bowlby, which phase is this?',opts:['Reorganization','Protest','Disorganization and despair','Numbness and disbelief'],ans:2,explain:'Bowlby&#39;s disorganization and despair phase: intense guilt, self-blame — "I should have done something." Feeling the full weight of the loss. (EAQ Ch.25)'},
{id:124,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A terminal cancer patient on opioids develops constipation. Which nursing measures help? (Select ALL that apply)',opts:['Promoting exercise','Encouraging a high-fiber diet','Encouraging fluid intake','Administering daily enemas','Stopping opioid medications'],ans:[0,1,2],multi:true,explain:'Promote exercise, high-fiber diet, and fluid intake for opioid-induced constipation. Also initiate stool softener/stimulant. Daily enemas too aggressive. Never stop opioids for pain. (EAQ Ch.25)'},
{id:125,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'Which outcome on a terminal patient&#39;s care plan is INAPPROPRIATE?',opts:['Patient reports decreased pain levels','Patient participates in self-care activities as able','Patient verbalizes acceptance of diagnosis','Regain function at or above the pre-illness phase'],ans:3,explain:'"Regain function at or above pre-illness phase" is INAPPROPRIATE — a curative/rehabilitation goal not suitable for terminal illness. Terminal care goals focus on comfort, dignity, quality of life. (EAQ Ch.25)'},
{id:126,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'An elderly patient becomes MORE depressed after learning his only son died while still grieving his spouse. The nurse identifies this as:',opts:['Normal acute grief','Anticipatory grief','Complicated grieving','Delayed grief'],ans:2,explain:'Complicated grieving: new losses before resolution of prior grief overwhelm coping ability. Layered losses require professional intervention. (EAQ Ch.25)'},
{id:127,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A hospice patient in last stage has dyspnea. Which interventions should the nurse perform? (Select ALL that apply)',opts:['Provide oxygen as prescribed','Maintain a patent airway','Reduce anxiety and fear','Administer antibiotics','Apply restraints for safety'],ans:[0,1,2],multi:true,explain:'For dyspnea in dying: oxygen (ordered), maintain airway, reduce anxiety/fear. Opioids/anxiolytics also treat dyspnea. Antibiotics and restraints are not comfort measures. (EAQ Ch.25)'},
{id:128,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A terminal patient has noisy, irregular, labored respirations with crackles from accumulated secretions. Which intervention is performed?',opts:['Aggressive suctioning every 30 minutes','Administering oxygen','Positioning the patient prone','Initiating CPR'],ans:1,explain:'Administering oxygen addresses gas exchange needs and provides comfort during the death rattle. Aggressive suctioning is distressing and NOT therapeutic for dying patients. (EAQ Ch.25)'},
{id:129,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A patient with advanced cancer wants natural death without much intervention. How can this wish be executed when unable to speak during dying?',opts:['A verbal statement to family is sufficient','Use an advance directive to convey the wish','Rely on family to speak informally','Verbally refuse treatment before incapacitation'],ans:1,explain:'An advance directive (living will, POLST, DPOH) is the legal mechanism to ensure patient&#39;s wishes are honored when they can no longer speak. Verbal statements alone do not carry the same legal weight. (EAQ Ch.25)'},
{id:130,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A DNR order is on the chart. Which treatments are WITHHELD? (Select ALL that apply)',opts:['Intubation','Chest compressions','Pain medications','Oral hygiene and comfort care'],ans:[0,1],multi:true,explain:'DNR withholds ONLY: intubation and chest compressions (CPR measures). Does NOT withhold pain medications, comfort care, oral hygiene, or nutrition. (EAQ Ch.25)'},
{id:131,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A UAP prepares morning care for a dying patient who complains of severe fatigue. What should the nurse instruct the UAP to do?',opts:['Complete all care as scheduled','Delay all care until afternoon','Limit care to essential tasks the patient wants to perform','Skip all care for the day'],ans:2,explain:'"Limit care to essential tasks the patient wants to perform." Dying patients with severe fatigue should have care minimized to what is necessary and desired. Patient-led care respects autonomy. (EAQ Ch.25)'},
{id:132,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'Which intervention helps a dying patient who is nauseated?',opts:['Bring food trays immediately to bedside','Uncover food OUTSIDE the room before bringing it in','Offer large portions of bland foods','Keep food covered at the bedside'],ans:1,explain:'Uncovering food outside the room first allows food odors to dissipate before entering — reducing nausea triggers. Food smells are a common trigger for dying patients. (EAQ Ch.25)'},
{id:133,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'The nurse asks family to bring home-cooked food for a terminal patient. Which benefits result? (Select ALL that apply)',opts:['Enhances the patient&#39;s comfort level','Provides the patient&#39;s preferred food','Allows the family to participate in care','Eliminates all nursing nutritional responsibilities'],ans:[0,1,2],multi:true,explain:'Home-cooked food: enhances comfort (familiar), provides preferred/culturally meaningful food, and gives family a meaningful way to participate in care. (EAQ Ch.25)'},
{id:134,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'The nurse assesses family members of suicide victims. Which symptoms are expected? (Select ALL that apply)',opts:['Anger','Guilt','Grief','Shame'],ans:[0,1,2,3],multi:true,explain:'All four: anger, guilt, grief, and shame (stigma around suicide) are expected in suicide survivor grief. These require SPECIALIZED support. (EAQ Ch.25)'},
{id:135,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A nursing supervisor reviews a care plan for a 79-year-old widow with complicated grief. Which documented intervention would the supervisor QUESTION?',opts:['Provide referral for grief counseling','Encourage social interaction with peers','Facilitate discussion of the positive aspects of loss','Assess sleep patterns and provide education'],ans:2,explain:'"Facilitate discussion of the positive aspects of loss" is non-therapeutic — it minimizes legitimate grief. There are NO positive aspects to emphasize when someone is experiencing complicated grief. (EAQ Ch.25)'},
{id:136,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'When assessing an older patient experiencing grief, which factors help identify reasons for grief? (Select ALL that apply)',opts:['Employment status','Social respect','Functional ability','Physical appearance'],ans:[0,1,2,3],multi:true,explain:'All four: employment status (role loss), social respect, functional ability, and physical appearance all contribute to grief in older adults. (EAQ Ch.25)'},
{id:137,mod:'eaq25',obj:'EAQ Ch.25',cat:'EAQ — Ch.25 Loss, Grief, Dying & Death',cc:'#0a5060',cb:'#e0f5f2',q:'A child&#39;s reaction to death depends on developmental stage. Which PARENTAL factors should the nurse examine? (Select ALL that apply)',opts:['Beliefs','Culture','Religious orientation','Financial status'],ans:[0,1,2],multi:true,explain:'Parental beliefs, culture, and religious orientation shape how they model responses to death and discuss it with children. Financial status is not a primary factor. (EAQ Ch.25)'}
].forEach(q=>QS.push(q));
// ── EAQ Chapter 40 Questions ──
[
{id:138,mod:'eaq40',obj:'EAQ Ch.40',cat:'EAQ — Ch.40 Hospice Care',cc:'#134a8e',cb:'#e8f0fe',q:'Family members cannot meet the financial needs of hospice care. Which team member should the nurse involve?',opts:['Nurse coordinator','Medical director','Social worker','Chaplain'],ans:2,explain:'The social worker assists with financial concerns, community resources, insurance filing, and emotional/grief support. The appropriate referral for financial barriers to hospice. (EAQ Ch.40)'},
{id:139,mod:'eaq40',obj:'EAQ Ch.40',cat:'EAQ — Ch.40 Hospice Care',cc:'#134a8e',cb:'#e8f0fe',q:'Which core interdisciplinary team member assists with community resources, insurance filing, and emotional/grief support?',opts:['Nurse coordinator','Medical director','Social worker','Bereavement coordinator'],ans:2,explain:'Social worker role: community resources, insurance paperwork, emotional and grief support. One of the most versatile roles on the hospice team. (EAQ Ch.40)'},
{id:140,mod:'eaq40',obj:'EAQ Ch.40',cat:'EAQ — Ch.40 Hospice Care',cc:'#134a8e',cb:'#e8f0fe',q:'A spouse asks about bereavement support during hospice admission. Which nurse response is MOST appropriate?',opts:['"Bereavement support is provided for 30 days after death."','"Bereavement follow-up care lasts for at least 1 year after death."','"Bereavement support ends when hospice care ends."','"Counseling is only available if the family requests it in writing."'],ans:1,explain:'"Bereavement follow-up care lasts for at least 1 year after death." The Medicare Hospice Benefit covers bereavement counseling for 1 year after the patient&#39;s death. (EAQ Ch.40)'},
{id:141,mod:'eaq40',obj:'EAQ Ch.40',cat:'EAQ — Ch.40 Hospice Care',cc:'#134a8e',cb:'#e8f0fe',q:'The hospice nurse knows to plan care based on which philosophy?',opts:['Extending life as long as medically possible','Maximizing the quality of the patient&#39;s remaining life','Following physician orders without patient input','Prioritizing family preferences over patient wishes'],ans:1,explain:'Hospice philosophy = maximizing quality of the patient&#39;s remaining life. Neither hastening nor postponing death. (EAQ Ch.40)'},
{id:142,mod:'eaq40',obj:'EAQ Ch.40',cat:'EAQ — Ch.40 Hospice Care',cc:'#134a8e',cb:'#e8f0fe',q:'A family says they can&#39;t afford hospice care for their mother. Which nurse response is BEST?',opts:['"Hospice is only covered by private insurance."','"If two physicians document your mother has less than 6 months to live, Medicare will pay for hospice."','"You must apply for Medicaid first."','"Hospice is free of charge for all terminal patients."'],ans:1,explain:'"If two physicians document less than 6 months to live, Medicare will pay for hospice." The Medicare Hospice Benefit — the most important financial fact about hospice access. (EAQ Ch.40)'},
{id:143,mod:'eaq40',obj:'EAQ Ch.40',cat:'EAQ — Ch.40 Hospice Care',cc:'#134a8e',cb:'#e8f0fe',q:'A patient stops responding to treatment and curative care is no longer possible. What should the nurse tell the patient and family about hospice?',opts:['The patient must accept death immediately','The patient will receive no further medical care','The hospice team will provide support to control the symptoms','The family must provide all physical care independently'],ans:2,explain:'"The hospice team will provide support to control the symptoms." This accurately describes the transition from curative to comfort-focused care. (EAQ Ch.40)'},
{id:144,mod:'eaq40',obj:'EAQ Ch.40',cat:'EAQ — Ch.40 Hospice Care',cc:'#134a8e',cb:'#e8f0fe',q:'After monitoring vital signs of a hospice patient, the nurse elevates the head of the bed. Which outcome is expected?',opts:['Decreased blood pressure','Reduced pain levels','Improved breathing patterns','Better peripheral circulation'],ans:2,explain:'Elevating the head of the bed improves breathing patterns — reduces diaphragm pressure, allows better lung expansion, relieves dyspnea. A key comfort intervention. (EAQ Ch.40)'},
{id:145,mod:'eaq40',obj:'EAQ Ch.40',cat:'EAQ — Ch.40 Hospice Care',cc:'#134a8e',cb:'#e8f0fe',q:'A patient asks who will comfort her family after she passes. Which nurse response is appropriate?',opts:['"After death, the hospice team no longer visits."','"The Medicare Hospice Benefit provides for bereavement counseling for 1 year after you have passed."','"Family counseling must be arranged separately."','"Support ends at the time of your death."'],ans:1,explain:'"The Medicare Hospice Benefit provides for bereavement counseling for 1 year after you have passed." Patients can be reassured their families will not be abandoned. (EAQ Ch.40)'},
{id:146,mod:'eaq40',obj:'EAQ Ch.40',cat:'EAQ — Ch.40 Hospice Care',cc:'#134a8e',cb:'#e8f0fe',q:'A patient has trouble with nausea and vomiting after chemotherapy. Which nursing intervention is MOST appropriate?',opts:['NPO for 24 hours then restart diet','Encourage the patient to eat slowly in a pleasant atmosphere with relaxation and rest periods after eating','Offer 3 large meals per day','Administer antiemetics only when nausea is severe'],ans:1,explain:'Eat slowly in a pleasant atmosphere with relaxation and rest periods — small, frequent, pleasant meals reduce chemo-induced nausea. (EAQ Ch.40)'},
{id:147,mod:'eaq40',obj:'EAQ Ch.40',cat:'EAQ — Ch.40 Hospice Care',cc:'#134a8e',cb:'#e8f0fe',q:'A patient has a 3-month terminal prognosis. How should the nurse introduce palliative and hospice care?',opts:['"We should increase treatment intensity."','"Your only option is hospice."','Introduce as redirection of care — shifting focus from cure to comfort and quality of life','Tell the patient nothing more can be done'],ans:2,explain:'"Redirection of care" — when curative treatment is no longer effective, hospice is introduced as redirecting focus from cure to comfort and quality of life. (EAQ Ch.40)'},
{id:148,mod:'eaq40',obj:'EAQ Ch.40',cat:'EAQ — Ch.40 Hospice Care',cc:'#134a8e',cb:'#e8f0fe',q:'A patient complains of tingling and burning pain in the extremities. The nurse documents this as which type of pain?',opts:['Somatic pain','Visceral pain','Neuropathic pain','Phantom pain'],ans:2,explain:'Neuropathic pain = nerve-related pain described as tingling, burning, shooting, or electrical sensations. Requires specific medications (gabapentin, TCAs, opioids) for management. (EAQ Ch.40)'},
{id:149,mod:'eaq40',obj:'EAQ Ch.40',cat:'EAQ — Ch.40 Hospice Care',cc:'#134a8e',cb:'#e8f0fe',q:'When opioids are initiated for pain, which intervention prevents constipation in a terminally ill patient?',opts:['Increase fiber intake only','Initiate a stool softener AND stimulant laxative','Administer enemas daily','Reduce opioid dose to minimum'],ans:1,explain:'Initiate a stool softener AND stimulant laxative prophylactically when opioids begin. Opioid-induced constipation is predictable — do not wait for it to develop. (EAQ Ch.40)'},
{id:150,mod:'eaq40',obj:'EAQ Ch.40',cat:'EAQ — Ch.40 Hospice Care',cc:'#134a8e',cb:'#e8f0fe',q:'A hospice patient near death cannot cough up secretions effectively. Which intervention should the nurse perform?',opts:['Suction aggressively every 30 minutes','Lay patient flat','Elevate the head of the bed with pillows','Administer cough suppressants'],ans:2,explain:'Elevating the head of the bed with pillows helps secretions drain and improves comfort — a non-invasive, non-distressing comfort measure. Aggressive suctioning causes distress in dying patients. (EAQ Ch.40)'},
{id:151,mod:'eaq40',obj:'EAQ Ch.40',cat:'EAQ — Ch.40 Hospice Care',cc:'#134a8e',cb:'#e8f0fe',q:'A hospice patient reports stomach pain rated 7/10. Which intervention is APPROPRIATE?',opts:['Document and reassess in 2 hours','Administer current PRN medications only','Call the health care provider to see if another pain medication can be given','Apply warm compresses to the abdomen'],ans:2,explain:'Pain rated 7/10 requires escalation — call the health care provider for reassessment. Pain above 4/10 typically requires adjustment of the medication regimen. (EAQ Ch.40)'},
{id:152,mod:'eaq40',obj:'EAQ Ch.40',cat:'EAQ — Ch.40 Hospice Care',cc:'#134a8e',cb:'#e8f0fe',q:'A patient with end-stage colon cancer reports squeezing pain on the left side of the abdomen. The nurse documents this as:',opts:['Somatic pain','Neuropathic pain','Phantom pain','Visceral pain'],ans:3,explain:'Visceral pain = pain from internal organs: squeezing, cramping, pressure, deep aching. Colon cancer produces visceral pain — requires different management than somatic or neuropathic types. (EAQ Ch.40)'},
{id:153,mod:'eaq40',obj:'EAQ Ch.40',cat:'EAQ — Ch.40 Hospice Care',cc:'#134a8e',cb:'#e8f0fe',q:'A nurse assesses a Stage II pressure ulcer on the sacral area of a hospice patient. Which intervention is APPROPRIATE?',opts:['Debride the wound aggressively','Apply a skin protector','Order a wound culture','Apply topical antibiotic ointment'],ans:1,explain:'Apply a skin protector — in hospice care, wound management focuses on comfort and preventing further breakdown. Stage II = partial thickness. A skin protector maintains and protects the wound. (EAQ Ch.40)'},
{id:154,mod:'eaq40',obj:'EAQ Ch.40',cat:'EAQ — Ch.40 Hospice Care',cc:'#134a8e',cb:'#e8f0fe',q:'Which physiologic adaptation may the nurse observe 24-48 hours before death?',opts:['Decreased urine output only','Sudden rise in blood pressure','The death rattle — noisy, labored respirations from accumulated secretions','Bradycardia with hypertension'],ans:2,explain:'"The death rattle" — noisy respirations from secretions the patient can no longer clear — appears 24–48 hours before death. Reassure the family it is NOT painful; it is a normal part of dying. (EAQ Ch.40)'}
].forEach(q=>QS.push(q));
