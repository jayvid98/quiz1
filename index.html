<script>
const L=['A','B','C','D','E'];
const state={};
let cf='all';
const QS=[
{id:1,mod:'m1',obj:'M1 Obj 1',cat:'Role of Loss in the Grief Reaction',icon:'💔',cc:'#0a8f80',cb:'#e0f5f2',q:'Loss is defined as:',opts:['The death of a loved one only','An aspect of self no longer available to a person','A temporary feeling of sadness','Only physical losses such as body parts'],ans:1,explain:'Loss = "an aspect of self no longer available to a person." It is broader than death — includes any significant absence: relationship, role, body function, or possession. (Ch. 25 slides)'},
{id:2,mod:'m1',obj:'M1 Obj 1',cat:'Role of Loss in the Grief Reaction',icon:'💔',cc:'#0a8f80',cb:'#e0f5f2',q:'Which of the following are recognized types of loss? Select ALL that apply.',opts:['Maturational loss','Situational loss','Personal loss','Obvious loss','Not-so-obvious loss'],ans:[0,1,2,3,4],multi:true,explain:'Ch. 25 lists all five: maturational (expected life transitions), situational (unexpected events), personal, obvious, and not-so-obvious losses. Not all losses are immediate or apparent.'},
{id:3,mod:'m1',obj:'M1 Obj 1',cat:'Role of Loss in the Grief Reaction',icon:'💔',cc:'#0a8f80',cb:'#e0f5f2',q:'A patient loses the ability to walk after a stroke. This is classified as:',opts:['Maturational loss','Situational loss','Anticipated loss','Disenfranchised loss'],ans:1,explain:'Situational loss = an unexpected loss not tied to normal developmental transitions. Sudden loss of a body function from a stroke is a situational loss. (Ch. 25 / Ch. 16)'},
{id:4,mod:'m1',obj:'M1 Obj 1',cat:'Role of Loss in the Grief Reaction',icon:'💔',cc:'#0a8f80',cb:'#e0f5f2',q:'Grief is defined as:',opts:['Only the feeling of sadness after death','A legal declaration following a death','A pattern of physical AND emotional responses to bereavement','A process that takes exactly 12 months to complete'],ans:2,explain:'Grief = "a pattern of physical AND emotional responses to bereavement." It includes both physical symptoms (fatigue, insomnia) and emotional responses (sadness, anger, guilt). (Ch. 25 slides)'},
{id:5,mod:'m1',obj:'M1 Obj 1',cat:'Role of Loss in the Grief Reaction',icon:'💔',cc:'#0a8f80',cb:'#e0f5f2',q:'"Grief work" is defined as:',opts:['Documenting grief in the chart','The process of adapting to and mourning a loss','A type of psychiatric therapy','Applying for grief counseling services'],ans:1,explain:'Grief work = "the process of adapting to and mourning a loss." It is an active process requiring psychological and emotional effort. (Ch. 25 slides)'},
{id:6,mod:'m1',obj:'M1 Obj 1',cat:'Role of Loss in the Grief Reaction',icon:'💔',cc:'#0a8f80',cb:'#e0f5f2',q:'Anticipatory grief occurs:',opts:['Only after a death has occurred','Before the actual loss — such as when a terminal diagnosis is given','Only in elderly patients','Exclusively in cases of sudden unexpected death'],ans:1,explain:'Anticipatory grief occurs BEFORE the actual loss — the patient and family begin grieving the impending death when a terminal diagnosis is received. (Ch. 16 textbook / Ch. 25 slides)'},
{id:7,mod:'m1',obj:'M1 Obj 1',cat:'Role of Loss in the Grief Reaction',icon:'💔',cc:'#0a8f80',cb:'#e0f5f2',q:'Which statement about grief tasks is TRUE?',opts:['They must be completed in a specific sequential order','They are not sequential — people complete them in individual ways and timelines','They can only be completed with professional therapy','They should all be completed within 6 months'],ans:1,explain:'Grief tasks "are NOT sequential." (Ch. 25 slides) People move through grief in individual ways. Tasks include: positive interactions, support groups, establishing goals, discussing meaning of the loss.'},
{id:8,mod:'m1',obj:'M1 Obj 1',cat:'Role of Loss in the Grief Reaction',icon:'💔',cc:'#0a8f80',cb:'#e0f5f2',q:'Bereavement encompasses: (Select ALL that apply)',opts:['Grief — the internal emotional response','Mourning — the outward expression','The entire adjustment period after loss','Can be influenced by cultural and religious practices','Only applies to death'],ans:[0,1,2,3],multi:true,explain:'Bereavement encompasses grief (internal), mourning (outward expression), and the entire adjustment period. It IS influenced by culture and religion. It applies to various types of significant loss, not only death. (Ch. 16 textbook)'},
{id:9,mod:'m1',obj:'M1 Obj 2',cat:'Changes in the Healthcare System',icon:'🏛️',cc:'#134a8e',cb:'#e8f0fe',q:'Before the 1950s, most patients died:',opts:['In hospital ICUs','At home in their own beds with family present','In dedicated hospice facilities','In nursing homes'],ans:1,explain:'Before the 1950s, it was common for patients to die at home in their own beds with family present. Death was a community and family experience. (Ch. 25 slides)'},
{id:10,mod:'m1',obj:'M1 Obj 2',cat:'Changes in the Healthcare System',icon:'🏛️',cc:'#134a8e',cb:'#e8f0fe',q:'From the 1950s to the 1980s, dying became:',opts:['More home-based and family-centered','Highly mechanized — occurring mostly in institutions','Dominated by hospice care','Focused on comfort rather than cure'],ans:1,explain:'From 1950s–1980s, "the health care system became highly mechanized and dying occurred mostly in institutions." Technology prolonged dying in hospitals. (Ch. 25 slides)'},
{id:11,mod:'m1',obj:'M1 Obj 2',cat:'Changes in the Healthcare System',icon:'🏛️',cc:'#134a8e',cb:'#e8f0fe',q:'What changed the trend of institutionalized dying in the early 1980s?',opts:['The creation of the DNR order','Diagnosis Related Groups (DRGs) leading to earlier hospital discharge','The HIPAA privacy act','Introduction of Medicare Part D'],ans:1,explain:'DRGs (Diagnosis Related Groups), introduced in the early 1980s, changed reimbursement and led to earlier discharges — shifting care back to home, convalescent homes, and nursing homes. (Ch. 25 slides)'},
{id:12,mod:'m1',obj:'M1 Obj 2',cat:'Changes in the Healthcare System',icon:'🏛️',cc:'#134a8e',cb:'#e8f0fe',q:'1960s pioneers whose works stimulated healthcare research on death and dying were:',opts:['Nightingale, Orem, and Peplau','Kübler-Ross, Glassner, and Strauss','Maslow, Erikson, and Piaget','Watson, Henderson, and Roy'],ans:1,explain:'Kübler-Ross, Glassner, and Strauss "produced works that stimulated the health care industry to research topics about death and dying" in the 1960s. (Ch. 25 slides)'},
{id:13,mod:'m1',obj:'M1 Obj 2',cat:'Changes in the Healthcare System',icon:'🏛️',cc:'#134a8e',cb:'#e8f0fe',q:'Hospices became recognized as health care delivery systems in which decade?',opts:['1950s','1960s','1970s','1980s'],ans:2,explain:'The 1970s: "Hospices became recognized as health care delivery systems." The first US hospice opened in Connecticut in 1971. (Ch. 25 / Ch. 40 slides)'},
{id:14,mod:'m1',obj:'M1 Obj 2',cat:'Changes in the Healthcare System',icon:'🏛️',cc:'#134a8e',cb:'#e8f0fe',q:'Currently, terminally ill patients are most often discharged to: (Select ALL that apply)',opts:['Home','Convalescent home','Nursing home','Hospital ICU for long-term stay','Hospice facility'],ans:[0,1,2,4],multi:true,explain:'Currently: discharged to "home, a convalescent home, or a nursing home" — and hospice facilities as applicable. Long-term hospital ICU stays for terminal patients have largely been replaced by these settings. (Ch. 25 slides)'},
{id:15,mod:'m1',obj:'M1 Obj 3',cat:'Stages of Dying & Complicated Grieving',icon:'🧠',cc:'#6b3fa0',cb:'#f0ebfc',q:'A patient told she has terminal cancer says "The tests must be wrong. This can\'t be happening to me." Which Kübler-Ross stage is this?',opts:['Anger','Denial','Bargaining','Acceptance'],ans:1,explain:'DENIAL — Stage 1: shock and numbness. "This can\'t be real." Initial reaction to terminal news — the patient refuses to accept the reality of the diagnosis. (Ch. 15 textbook / Ch. 25 slides)'},
{id:16,mod:'m1',obj:'M1 Obj 3',cat:'Stages of Dying & Complicated Grieving',icon:'🧠',cc:'#6b3fa0',cb:'#f0ebfc',q:'A patient shouts: "Why is this happening to ME? It isn\'t fair!" This represents:',opts:['Depression','Denial','Anger','Bargaining'],ans:2,explain:'ANGER — Stage 2: resentment and outrage. "Why me?" Patient resists the loss with emotional outrage, sometimes directed at caregivers, family, or God. (Ch. 15 textbook / Ch. 25 slides)'},
{id:17,mod:'m1',obj:'M1 Obj 3',cat:'Stages of Dying & Complicated Grieving',icon:'🧠',cc:'#6b3fa0',cb:'#f0ebfc',q:'A patient says: "If God lets me live to see my grandchild born, I promise to volunteer every week." This is:',opts:['Depression','Acceptance','Anger','Bargaining'],ans:3,explain:'BARGAINING — Stage 3: making deals, often with a higher power, trying to negotiate time or a reprieve in exchange for a promise. (Ch. 15 textbook / Ch. 25 slides)'},
{id:18,mod:'m1',obj:'M1 Obj 3',cat:'Stages of Dying & Complicated Grieving',icon:'🧠',cc:'#6b3fa0',cb:'#f0ebfc',q:'A dying patient becomes tearful, withdraws from family, and says "I\'m so sad about all the things I\'m going to miss." This is:',opts:['Anger','Denial','Bargaining','Depression'],ans:3,explain:'DEPRESSION — Stage 4: profound sadness, withdrawal, and grief about anticipated losses. Patient mourns what will be left behind. (Ch. 15 textbook / Ch. 25 slides)'},
{id:19,mod:'m1',obj:'M1 Obj 3',cat:'Stages of Dying & Complicated Grieving',icon:'🧠',cc:'#6b3fa0',cb:'#f0ebfc',q:'A patient says calmly: "I\'ve lived a good life and made my peace. I\'m ready." This represents:',opts:['Denial','Bargaining','Depression','Acceptance'],ans:3,explain:'ACCEPTANCE — Stage 5: peace and readiness. "My time has come." Patient has worked through the emotional stages and found peace with dying. Not all patients reach this stage. (Ch. 15 / Ch. 25)'},
{id:20,mod:'m1',obj:'M1 Obj 3',cat:'Stages of Dying & Complicated Grieving',icon:'🧠',cc:'#6b3fa0',cb:'#f0ebfc',q:'What are the 5 Kübler-Ross stages in the CORRECT order?',opts:['Anger, Denial, Bargaining, Acceptance, Depression','Denial, Anger, Bargaining, Depression, Acceptance','Bargaining, Denial, Depression, Anger, Acceptance','Denial, Depression, Anger, Bargaining, Acceptance'],ans:1,explain:'Denial → Anger → Bargaining → Depression → Acceptance (DABDA). Remember: patients do not always follow this sequence in order. (Ch. 15 textbook / Ch. 25 slides)'},
{id:21,mod:'m1',obj:'M1 Obj 3',cat:'Stages of Dying & Complicated Grieving',icon:'🧠',cc:'#6b3fa0',cb:'#f0ebfc',q:'Which is TRUE about the Kübler-Ross stages of dying?',opts:['All patients progress through all 5 stages in order','Some patients never reach acceptance — there is no required norm or sequence','Stages always take the same amount of time for each person','Patients who skip stages are in denial about their prognosis'],ans:1,explain:'"Some patients do not progress through the stages and may never pass beyond denial. There is no norm for the process of dying." (Ch. 15 textbook) They may skip stages, regress, or remain in one stage indefinitely.'},
{id:22,mod:'m1',obj:'M1 Obj 3',cat:'Stages of Dying & Complicated Grieving',icon:'🧠',cc:'#6b3fa0',cb:'#f0ebfc',q:'Unresolved or dysfunctional grief is characterized by:',opts:['Successfully completing all grief tasks within 6 months','Grief that interferes with daily functioning and does not follow a predictable course','A normal sadness that fades gradually over time','Grief only observed in elderly patients'],ans:1,explain:'Dysfunctional grief = failure to follow a predictable grieving course. It interferes with daily functioning. Signs: inability to work, social isolation, prolonged denial, self-destructive behavior, talk of suicide. (Ch. 15 / Ch. 16)'},
{id:23,mod:'m1',obj:'M1 Obj 3',cat:'Stages of Dying & Complicated Grieving',icon:'🧠',cc:'#6b3fa0',cb:'#f0ebfc',q:'Signs and symptoms of dysfunctional grief include: (Select ALL that apply)',opts:['Profound continuous sadness that does not improve','Withdrawal from social interactions','Talk of suicide or actual suicide attempts','Reckless or self-destructive behavior','Declining attention to personal appearance'],ans:[0,1,2,3,4],multi:true,explain:'ALL five are signs of dysfunctional grief. Additional signs: sleep disturbances, obsessing over/avoiding mementos, worsening mental health conditions. Talk of suicide requires IMMEDIATE professional intervention. (Ch. 16 textbook)'},
{id:24,mod:'m1',obj:'M1 Obj 3',cat:'Stages of Dying & Complicated Grieving',icon:'🧠',cc:'#6b3fa0',cb:'#f0ebfc',q:'The BEST nursing action for a patient showing signs of dysfunctional grief is:',opts:['Tell the patient to "get over it"','Allow the patient to grieve without any intervention','Refer to support groups, therapists, or grief counselors','Document and wait 6 more months before acting'],ans:2,explain:'Referral to support groups, therapists, or grief counselors is the best action. Hospice agencies can also assist with accessing these resources. Dysfunctional grief requires professional intervention. (Ch. 16 textbook / Ch. 40)'},
{id:25,mod:'m1',obj:'M1 Obj 4',cat:'Five Aspects of Human Functioning',icon:'🔵',cc:'#2d4a6e',cb:'#e8eef8',q:'The five aspects of human functioning that interact during the grieving-dying process are:',opts:['Physical, emotional, intellectual, social, and spiritual','Medical, legal, financial, emotional, and physical','Biological, psychological, sociological, cultural, and economic','Respiratory, cardiac, neurological, endocrine, and immune'],ans:0,explain:'The five aspects of human functioning: physical, emotional, intellectual, social, and spiritual. All five interact during the grieving-dying process — a change in one affects all others. This holistic framework guides nursing care. (Foundations of Nursing — Cooper & Gosnell)'},
{id:26,mod:'m1',obj:'M1 Obj 4',cat:'Five Aspects of Human Functioning',icon:'🔵',cc:'#2d4a6e',cb:'#e8eef8',q:'Which PHYSICAL aspects are affected in the grieving-dying process? (Select ALL that apply)',opts:['Pain and physical symptoms','Declining body function and mobility loss','Physiological changes of dying (Cheyne-Stokes, mottled skin)','Weight loss and decreased appetite','All of these — and they affect the emotional and social aspects too'],ans:[0,1,2,3,4],multi:true,explain:'ALL are physical aspects affected during dying. Physical suffering directly impacts emotional (fear, depression), intellectual (decision-making capacity), social (withdrawal), and spiritual (questioning meaning) aspects. Nursing must address ALL five holistically. (Ch. 15 / Ch. 25 / Ch. 40)'},
{id:27,mod:'m1',obj:'M1 Obj 4',cat:'Five Aspects of Human Functioning',icon:'🔵',cc:'#2d4a6e',cb:'#e8eef8',q:'The EMOTIONAL aspect of human functioning in dying includes:',opts:['Laboratory values and vital signs','The Kübler-Ross grief stages, fear, guilt, helplessness, and anger','Legal advance care planning only','Religious rituals at time of death only'],ans:1,explain:'Emotional aspects: the Kübler-Ross stages, fear of pain/being a burden, guilt, helplessness in family members. Two key family emotional behaviors: helplessness and guilt — both must be addressed quickly by the nurse. (Ch. 15 / Ch. 25)'},
{id:28,mod:'m1',obj:'M1 Obj 4',cat:'Five Aspects of Human Functioning',icon:'🔵',cc:'#2d4a6e',cb:'#e8eef8',q:'The INTELLECTUAL aspect of human functioning during dying refers to:',opts:['The patient\'s academic education level','Cognitive ability to understand prognosis, make informed decisions, and complete advance directives while capacity exists','The patient\'s IQ score','The number of medical procedures the patient has had'],ans:1,explain:'Intellectual aspect: decision-making capacity, understanding prognosis, processing information about treatment options, completing advance directives BEFORE incapacitation. Cognitive decline directly affects ability to express wishes. (Ch. 15 — advance directives / Patient Self-Determination Act)'},
{id:29,mod:'m1',obj:'M1 Obj 4',cat:'Five Aspects of Human Functioning',icon:'🔵',cc:'#2d4a6e',cb:'#e8eef8',q:'How does the SOCIAL aspect of human functioning interact with dying and grief?',opts:['It is unaffected by the dying process','Social isolation, family relationships, cultural practices, support systems, and role changes all affect and are affected by dying','It only applies to patients with large social networks','Social factors only matter after death, not during dying'],ans:1,explain:'Social aspects: family relationships (helplessness, guilt), cultural death rituals, support systems, loss of social roles, and isolation. Therapeutic presence and family support are key nursing interventions for this aspect. (Ch. 15, Ch. 16, Ch. 25)'},
{id:30,mod:'m1',obj:'M1 Obj 4',cat:'Five Aspects of Human Functioning',icon:'🔵',cc:'#2d4a6e',cb:'#e8eef8',q:'The SPIRITUAL aspect of human functioning during dying includes:',opts:['Only formal religious practices','Seeking meaning, questioning life\'s purpose, religious rituals, legacy, and finding peace','Medical decisions about resuscitation','The patient\'s financial estate planning'],ans:1,explain:'Spiritual aspects: finding meaning, questioning faith (especially in anger stage), religious/cultural rituals, legacy (what will I leave behind), and the search for peace. Palliative care explicitly integrates psychological AND spiritual aspects of care. (Ch. 15 / Ch. 25 / Ch. 40)'},
{id:31,mod:'m1',obj:'M1 Obj 4',cat:'Five Aspects of Human Functioning',icon:'🔵',cc:'#2d4a6e',cb:'#e8eef8',q:'A dying patient who was previously engaged has become withdrawn, stopped eating, lost 10 lbs, and refuses to discuss plans. This illustrates:',opts:['Normal behavior requiring no intervention','The interaction of physical (weight loss), emotional (withdrawal), and social (isolation) aspects of functioning','A medication side effect only','Depression unrelated to dying'],ans:1,explain:'This illustrates how the five aspects interact: physical decline (weight loss) → affects emotional (withdrawal/depression) → affects social (isolation from family). Nursing must address ALL five aspects holistically — not just one in isolation. (Module 1 Obj 4)'},
{id:32,mod:'m1',obj:'M1 Obj 5',cat:'Special Circumstances in Grieving',icon:'👶',cc:'#a0284a',cb:'#fdedf3',q:'Which special circumstances require unique nursing grief interventions? (Select ALL that apply)',opts:['Perinatal death','Pediatric death','Suicide','Gerontologic (older adult) death','Sudden or unexpected death'],ans:[0,1,2,3,4],multi:true,explain:'All five are listed in Ch. 25 (Slide 13) as special supportive care circumstances — each requiring tailored nursing interventions and support strategies. (Ch. 25 slides)'},
{id:33,mod:'m1',obj:'M1 Obj 5',cat:'Special Circumstances in Grieving',icon:'👶',cc:'#a0284a',cb:'#fdedf3',q:'Perinatal loss statistics — which is correct?',opts:['Less than 1% of pregnancies end in miscarriage','Up to 20% of recognized pregnancies end in miscarriage; 1% in stillbirth','Exactly 10% of all pregnancies','50% of first-time pregnancies'],ans:1,explain:'Up to 20% of recognized pregnancies end in miscarriage; 1% in stillbirth. Profound grief begins in the 2nd trimester as attachment forms. Health-care team must provide information and much-needed support. (Ch. 16 textbook)'},
{id:34,mod:'m1',obj:'M1 Obj 5',cat:'Special Circumstances in Grieving',icon:'👶',cc:'#a0284a',cb:'#fdedf3',q:'BEST nursing interventions after a perinatal loss (stillbirth) include: (Select ALL that apply)',opts:['Allowing parents to hold the infant if they wish','Providing a "memory kit" with photos, footprints, ID bands','Giving clear information about the cause of death','Referring to bereavement support services','Telling parents "You can have another baby" to comfort them'],ans:[0,1,2,3],explain:'"You can have another baby" is NON-THERAPEUTIC — it minimizes this unique loss. The other four interventions ARE therapeutic: holding the infant, memory kit, clear information, bereavement referral. (Ch. 16 textbook)'},
{id:35,mod:'m1',obj:'M1 Obj 5',cat:'Special Circumstances in Grieving',icon:'👶',cc:'#a0284a',cb:'#fdedf3',q:'A school-age child whose parent just died should be:',opts:['Kept away from the funeral to protect them','Told the parent "went on a long trip"','Encouraged to attend the funeral or memorial service','Not told the truth about the death'],ans:2,explain:'School-age children should be encouraged to attend funeral or memorial services — it helps them understand the reality of death and facilitates the grieving process. Always use truthful, age-appropriate language. (Ch. 15 — Table 15.3)'},
{id:36,mod:'m1',obj:'M1 Obj 5',cat:'Special Circumstances in Grieving',icon:'👶',cc:'#a0284a',cb:'#fdedf3',q:'When explaining death to a PRESCHOOL child, the nurse should:',opts:['Say the person "went to sleep permanently"','Avoid the topic completely','Use simple, age-appropriate language and NEVER explain death as "sleep"','Tell the child it was their fault'],ans:2,explain:'Preschoolers view death as reversible (like sleep) and use magical thinking. NEVER explain death as sleep — they may fear sleeping. Use simple, truthful language. Accept temporary regression. Reassure they are NOT the cause. (Ch. 15 — Table 15.3)'},
{id:37,mod:'m1',obj:'M1 Obj 5',cat:'Special Circumstances in Grieving',icon:'👶',cc:'#a0284a',cb:'#fdedf3',q:'After a patient dies by suicide, UNIQUE considerations for survivors include: (Select ALL that apply)',opts:['Survivors may feel rejected and abandoned','Survivors often experience intense blame and guilt','Decreased self-esteem is common','Survivors may worry about inherited predisposition','Standard grief support is always sufficient for suicide survivors'],ans:[0,1,2,3],explain:'Suicide survivors face unique grief: feeling rejected, intense blame/guilt, decreased self-esteem, stigma, and concern about genetic predisposition. SPECIALIZED support beyond standard protocols is needed. (Ch. 16 / Ch. 25)'},
{id:38,mod:'m1',obj:'M1 Obj 5',cat:'Special Circumstances in Grieving',icon:'👶',cc:'#a0284a',cb:'#fdedf3',q:'The BEST approach when supporting a grieving OLDER ADULT is:',opts:['Assume they have already come to terms with death due to their age','Treat their grief as less significant because they lived a long life','Provide individualized support — do not assume age equates to readiness or acceptance','Tell them to be grateful for having lived so long'],ans:2,explain:'Gerontologic grief requires individualized care. Do NOT assume older adults grieve less or that death is "easier" for them. Life review, spiritual support, and family connection are important. Their grief is equally valid. (Ch. 25 / Ch. 16)'},
{id:39,mod:'m1',obj:'M1 Obj 5',cat:'Special Circumstances in Grieving',icon:'👶',cc:'#a0284a',cb:'#fdedf3',q:'Approximately what percentage of adolescents have experienced loss of a parent by high school graduation?',opts:['25%','50%','71%','90%'],ans:2,explain:'71% of adolescents have experienced loss of a parent by high school graduation. Adolescents understand death is permanent but may feel personally immortal and engage in risky behaviors. Include them in family discussions and decisions. (Ch. 16 textbook)'},
{id:40,mod:'m1',obj:'M1 Obj 6',cat:'EOL Concepts — Euthanasia, DNR, Organ Donation & Rights',icon:'⚖️',cc:'#c87c00',cb:'#fff3d0',q:'Euthanasia is defined as:',opts:['Withholding pain medications from a terminal patient','The intentional act of causing death to relieve suffering','A natural death without medical intervention','Writing a DNR order'],ans:1,explain:'Euthanasia = the intentional act of causing death. From Greek: eu ("good") + thanatos ("death"). Controversial — involves legal, moral, and ethical issues. Differs from "allowing natural death" or withholding futile treatment. (Ch. 15 textbook / Ch. 25 slides)'},
{id:41,mod:'m1',obj:'M1 Obj 6',cat:'EOL Concepts — Euthanasia, DNR, Organ Donation & Rights',icon:'⚖️',cc:'#c87c00',cb:'#fff3d0',q:'Assisted suicide is currently legal in:',opts:['All 50 states','No states — federally illegal everywhere','California, Oregon, Washington, Montana, Vermont, New Jersey, Hawaii, Colorado, Maine, and DC','Only California and Oregon'],ans:2,explain:'Assisted suicide is legal in California, Oregon, Washington, Montana, Vermont, New Jersey, Hawaii, Colorado, Maine, and the District of Columbia. It remains illegal in most other states. (Ch. 15 textbook)'},
{id:42,mod:'m1',obj:'M1 Obj 6',cat:'EOL Concepts — Euthanasia, DNR, Organ Donation & Rights',icon:'⚖️',cc:'#c87c00',cb:'#fff3d0',q:'Who is the ONLY person authorized to write a DNR order?',opts:['The patient','The patient\'s family or next of kin','A registered nurse with physician approval','A licensed physician'],ans:3,explain:'ONLY a licensed physician can write a DNR order. Nurses, family members, and patients acting alone cannot create a valid DNR. The nurse must advocate for the patient\'s expressed wishes and communicate them to the physician. (Ch. 15 textbook)'},
{id:43,mod:'m1',obj:'M1 Obj 6',cat:'EOL Concepts — Euthanasia, DNR, Organ Donation & Rights',icon:'⚖️',cc:'#c87c00',cb:'#fff3d0',q:'A DNR order means that if the patient stops breathing or their heart stops:',opts:['CPR will be attempted for exactly 2 minutes','No cardiopulmonary resuscitation will be attempted','Only chest compressions will be performed','The patient is transferred to the ICU'],ans:1,explain:'A DNR means NO CPR — no chest compressions, ventilation, defibrillation, or resuscitation drugs. Also called "No Code" or "Allow Natural Death." CRITICAL: A DNR does NOT mean withholding ALL care — comfort measures continue. (Ch. 15 textbook)'},
{id:44,mod:'m1',obj:'M1 Obj 6',cat:'EOL Concepts — Euthanasia, DNR, Organ Donation & Rights',icon:'⚖️',cc:'#c87c00',cb:'#fff3d0',q:'The Patient Self-Determination Act (1991) requires that at hospital admission, ALL patients must be:',opts:['Given a DNR order','Required to sign a living will','Informed about AHCDs and asked if they have one; given information about their right to refuse treatment','Assigned an ethics committee member'],ans:2,explain:'The Patient Self-Determination Act (1991) mandates all patients at admission must be informed about advance health-care directives, asked if they have one, and told of their right to accept or refuse treatment. (Ch. 15 textbook)'},
{id:45,mod:'m1',obj:'M1 Obj 6',cat:'EOL Concepts — Euthanasia, DNR, Organ Donation & Rights',icon:'⚖️',cc:'#c87c00',cb:'#fff3d0',q:'The Durable Power of Attorney for Health Care (DPOH):',opts:['Is the same as a general financial power of attorney','Designates a specific person to make health-care decisions when the patient cannot communicate','Is written by the physician','Can only be signed after a terminal diagnosis'],ans:1,explain:'The DPOH designates a health-care proxy/surrogate to make decisions when the patient lacks capacity. Must be completed BEFORE incapacitation. NOT the same as a general power of attorney — DPOH covers health-care decisions specifically. (Ch. 15 textbook)'},
{id:46,mod:'m1',obj:'M1 Obj 6',cat:'EOL Concepts — Euthanasia, DNR, Organ Donation & Rights',icon:'⚖️',cc:'#c87c00',cb:'#fff3d0',q:'POLST differs from a DNR in that POLST:',opts:['Addresses only CPR — same as a DNR','Is a broader physician\'s order addressing CPR, ventilation, artificial nutrition/hydration, and goals of care','Can be written by a nurse','Is only valid while the patient is hospitalized'],ans:1,explain:'POLST is broader than a DNR — addresses multiple life-sustaining treatments: CPR, ventilation, artificial nutrition/hydration, and goals of care. It travels with the patient across ALL care settings. (Ch. 15 textbook)'},
{id:47,mod:'m1',obj:'M1 Obj 6',cat:'EOL Concepts — Euthanasia, DNR, Organ Donation & Rights',icon:'⚖️',cc:'#c87c00',cb:'#fff3d0',q:'Which rights are in the Dying Person\'s Bill of Rights? (Select ALL that apply)',opts:['The right to be treated as a living human being until death','The right to be free from pain','The right to die in peace and with dignity','The right to be free from deception','The right to retain individuality and not be judged for decisions'],ans:[0,1,2,3,4],multi:true,explain:'ALL five are in the Dying Person\'s Bill of Rights (Ch. 15 — Box 15.2). Additional rights: hope, expressing feelings, participating in decisions, receiving nursing/medical care, and having sanctity of body respected after death.'},
{id:48,mod:'m1',obj:'M1 Obj 6',cat:'EOL Concepts — Euthanasia, DNR, Organ Donation & Rights',icon:'⚖️',cc:'#c87c00',cb:'#fff3d0',q:'Fraudulent methods of treatment at end of life refer to:',opts:['Experimental treatments approved by the FDA','Unproven, deceptive, or exploitative therapies offered to terminally ill patients with no scientific evidence of benefit','Treatments that are expensive but effective','Standard palliative medications prescribed off-label'],ans:1,explain:'Fraudulent methods of treatment are unproven, deceptive therapies exploiting the vulnerability and hope of terminally ill patients. Nurses must educate patients and families about these risks. (Ch. 25 slides)'},
{id:49,mod:'m1',obj:'M1 Obj 6',cat:'EOL Concepts — Euthanasia, DNR, Organ Donation & Rights',icon:'⚖️',cc:'#c87c00',cb:'#fff3d0',q:'Regarding organ donation, which is TRUE?',opts:['Only physicians can discuss it with families','Nurses have no role in organ donation discussions','Organ donation is a key EOL issue nurses must be knowledgeable about; it requires informed consent','Organ donation automatically occurs after all hospital deaths'],ans:2,explain:'Organ donation is listed in Ch. 25 as one of the key issues related to dying and death. Nurses must be knowledgeable and able to support families through this process. Organ donation requires informed consent from the family or prior patient documentation. (Ch. 25 slides)'},
{id:50,mod:'m1',obj:'M1 Comfort',cat:'Nonpharmacological & Pharmacological Comfort Interventions',icon:'💊',cc:'#0a5060',cb:'#e0f0f0',q:'Nonpharmacological comfort interventions for a dying patient include: (Select ALL that apply)',opts:['Repositioning and turning the patient','Massage and therapeutic touch','Music therapy and relaxation techniques','Reducing environmental noise and dimming lights','Providing presence and therapeutic communication'],ans:[0,1,2,3,4],multi:true,explain:'All five are nonpharmacological comfort interventions. Others include: aromatherapy, guided imagery, prayer/spiritual support, and oral/skin care. These address physical, emotional, social, and spiritual aspects of comfort without medications. (Ch. 25 / Ch. 40)'},
{id:51,mod:'m1',obj:'M1 Comfort',cat:'Nonpharmacological & Pharmacological Comfort Interventions',icon:'💊',cc:'#0a5060',cb:'#e0f0f0',q:'Pain is identified in Chapter 40 as:',opts:['A minor concern easily managed with acetaminophen','The most feared symptom and the PRIORITY for symptom management — can be excruciating, constant, and terrifying','A symptom that automatically resolves near death','A symptom that should be undertreated to keep patients alert'],ans:1,explain:'"Pain is the most feared symptom and the priority for symptom management. It can be excruciating, constant, and terrifying." (Ch. 40 slides) Adequate pain control is an ethical imperative and the #1 nursing priority in palliative/hospice care.'},
{id:52,mod:'m1',obj:'M1 Comfort',cat:'Nonpharmacological & Pharmacological Comfort Interventions',icon:'💊',cc:'#0a5060',cb:'#e0f0f0',q:'Chapter 40 identifies three types of pain. Which are they? (Select ALL that apply)',opts:['Somatic pain','Visceral pain','Neuropathic pain','Referred pain','Psychogenic pain'],ans:[0,1,2],multi:true,explain:'Ch. 40 lists: somatic pain (musculoskeletal — aching, throbbing), visceral pain (organ-based — cramping, pressure), and neuropathic pain (nerve-related — burning, shooting). These types guide specific medication selection. (Ch. 40 slides)'},
{id:53,mod:'m1',obj:'M1 Comfort',cat:'Nonpharmacological & Pharmacological Comfort Interventions',icon:'💊',cc:'#0a5060',cb:'#e0f0f0',q:'Common symptoms requiring pharmacological management in terminal illness include: (Select ALL that apply)',opts:['Nausea and vomiting','Constipation (often opioid-induced)','Dyspnea and air hunger','Anorexia and malnutrition','Psychosocial and spiritual distress'],ans:[0,1,2,3,4],multi:true,explain:'All five are listed in Ch. 40. Pharmacological interventions: antiemetics (nausea), laxatives (constipation), opioids/anxiolytics (dyspnea), appetite stimulants (anorexia), anxiolytics/antidepressants (psychosocial distress). (Ch. 40 slides)'},
{id:54,mod:'m1',obj:'M1 Comfort',cat:'Nonpharmacological & Pharmacological Comfort Interventions',icon:'💊',cc:'#0a5060',cb:'#e0f0f0',q:'A dying patient reports uncontrolled pain despite current medications. The nurse\'s PRIORITY action is:',opts:['Document the pain score and wait for the next scheduled dose','Distract the patient with television','Immediately contact the physician to report uncontrolled pain and request adjustment of the pain plan','Ask the family to sit with the patient'],ans:2,explain:'Uncontrolled pain in a palliative patient is an emergency. The nurse must IMMEDIATELY notify the physician to adjust the pain plan. Waiting is never acceptable. (Ch. 40 / Palliative nursing principle)'},
{id:55,mod:'m2',obj:'M2 Obj 1',cat:'Hospice Care',icon:'🏥',cc:'#134a8e',cb:'#e8f0fe',q:'The philosophy of hospice care is BEST described as:',opts:['Aggressive treatment to cure disease at all cost','Comfort and quality of life — neither hastening nor postponing death, with holistic support to patient and family','Care that hastens death to relieve suffering','Medical care only, excluding emotional and spiritual support'],ans:1,explain:'"Philosophy of hospice: affirm life and regard dying as a normal process; neither hasten nor postpone death; improve quality of life; use team approach." (Ch. 40 / Ch. 25) This originated in Europe and reached the US in the early 1970s.'},
{id:56,mod:'m2',obj:'M2 Obj 1',cat:'Hospice Care',icon:'🏥',cc:'#134a8e',cb:'#e8f0fe',q:'The FOUR criteria for admission to hospice care are: (Select ALL that apply)',opts:['Physician certifies terminal illness with ≤ 6 months to live','Patient willing to forego curative treatment for palliative care only','Patient and caregiver understand care is comfort-focused and life support may not be performed','Patient understands prognosis and is willing to participate in care planning','Patient must already have a signed DNR order'],ans:[0,1,2,3],multi:true,explain:'The four criteria (Ch. 40): (1) physician certifies ≤6 months, (2) willing to forego curative treatment, (3) understand comfort-focused care, (4) understand prognosis and participate in planning. A DNR is NOT a required criterion.'},
{id:57,mod:'m2',obj:'M2 Obj 1',cat:'Hospice Care',icon:'🏥',cc:'#134a8e',cb:'#e8f0fe',q:'The hospice interdisciplinary team includes: (Select ALL that apply)',opts:['Medical director','Nurse coordinator','Social worker','Spiritual coordinator','Bereavement coordinator'],ans:[0,1,2,3,4],multi:true,explain:'Full hospice team (Ch. 40): medical director, nurse coordinator, social worker, spiritual coordinator, volunteer coordinator, BEREAVEMENT coordinator, hospice pharmacist, nutrition consultant, hospice aide, and other service providers.'},
{id:58,mod:'m2',obj:'M2 Obj 1',cat:'Hospice Care',icon:'🏥',cc:'#134a8e',cb:'#e8f0fe',q:'The goals of hospice care include: (Select ALL that apply)',opts:['Controlling or alleviating the patient\'s symptoms','Allowing patient and caregiver to be involved in decisions','Encouraging patient and caregiver to live life to the fullest','Providing continuous support to maintain confidence','Educating and supporting the primary caregiver'],ans:[0,1,2,3,4],multi:true,explain:'All five are listed as hospice goals in Ch. 40. Patient AND caregiver involvement is central — hospice views the family/caregiver unit as the "patient of care," not just the dying person.'},
{id:59,mod:'m2',obj:'M2 Obj 1',cat:'Hospice Care',icon:'🏥',cc:'#134a8e',cb:'#e8f0fe',q:'All hospice is palliative care, but not all palliative care is hospice because:',opts:['They are completely different','Hospice is a SPECIFIC type of palliative care for terminal patients with ≤6 months prognosis; palliative care can begin at ANY stage alongside curative treatment','Palliative care is only for terminal patients','Hospice can start at any stage of illness'],ans:1,explain:'All hospice is palliative (comfort-focused). Palliative care is broader — starts at ANY stage alongside treatment. Hospice is a specific type requiring terminal prognosis ≤6 months AND agreement to forego curative treatment. (Ch. 40 / Ch. 25)'},
{id:60,mod:'m2',obj:'M2 Obj 1',cat:'Hospice Care',icon:'🏥',cc:'#134a8e',cb:'#e8f0fe',q:'Hospice care is covered by:',opts:['Private pay only','Medicare, Medicaid, veterans\' benefits, and most private insurance','Only Medicare for patients over 65','No insurance covers hospice'],ans:1,explain:'Hospice is covered by Medicare (Medicare Hospice Benefit), Medicaid, veterans\' benefits, and most private insurance. Medicare Hospice Benefit became law in 1982. (Ch. 40 / Ch. 15 textbook)'},
{id:61,mod:'m2',obj:'M2 Obj 1',cat:'Hospice Care',icon:'🏥',cc:'#134a8e',cb:'#e8f0fe',q:'Ethical issues in hospice care include: (Select ALL that apply)',opts:['Withholding or withdrawing nutritional support','The right to refuse treatment','Allowing a natural death','Do not resuscitate (DNR) orders','Selecting which family members can visit'],ans:[0,1,2,3],multi:true,explain:'Ch. 40 Slide 12: ethical issues include "withholding or withdrawing nutritional support, the right to refuse treatment, allowing a natural death, and DNR orders." The nurse must be aware of the organization\'s ethics policies. Visitor selection is not an ethical issue listed.'},
{id:62,mod:'m2',obj:'M2 Obj 2',cat:'Nursing Interventions for the Dying Patient',icon:'👩‍⚕️',cc:'#0a8f80',cb:'#e0f5f2',q:'The most crucial needs of the dying patient are:',opts:['Financial planning and legal paperwork','Love and affection, control of pain, and preservation of dignity and self-worth','Frequent vital sign monitoring','Access to experimental treatments'],ans:1,explain:'"Most crucial needs are love and affection, control of pain, preservation of dignity and self-worth." (Ch. 25 Slide 11) These form the foundation of ALL nursing interventions for the dying patient.'},
{id:63,mod:'m2',obj:'M2 Obj 2',cat:'Nursing Interventions for the Dying Patient',icon:'👩‍⚕️',cc:'#0a8f80',cb:'#e0f5f2',q:'Therapeutic communication with the dying patient should: (Select ALL that apply)',opts:['Express respect for the patient','Maintain realistic hope','Offer appropriate reassurance and support','Require careful attention to verbal AND nonverbal expression','Accept and respect the patient\'s wishes if they don\'t wish to communicate'],ans:[0,1,2,3,4],multi:true,explain:'All five are components of therapeutic communication with dying patients. (Ch. 25 Slide 9) Forcing conversation is non-therapeutic. Presence and attentiveness are powerful interventions even without words.'},
{id:64,mod:'m2',obj:'M2 Obj 2',cat:'Nursing Interventions for the Dying Patient',icon:'👩‍⚕️',cc:'#0a8f80',cb:'#e0f5f2',q:'According to the WHO (Ch. 25), a nurse delivering palliative care should: (Select ALL that apply)',opts:['Provide relief from pain and other distressing symptoms','Affirm life and regard dying as a normal process','Neither hasten nor postpone death','Integrate psychological and spiritual aspects of care','Offer support to help patients live as actively as possible'],ans:[0,1,2,3,4],multi:true,explain:'All five are in the WHO palliative care framework (Ch. 25 Slide 10). Plus: uses team approach, helps families cope, and enhances quality of life. These principles guide ALL nursing interventions for the dying patient.'},
{id:65,mod:'m2',obj:'M2 Obj 2',cat:'Nursing Interventions for the Dying Patient',icon:'👩‍⚕️',cc:'#0a8f80',cb:'#e0f5f2',q:'A dying patient appears to be in a coma. A family member asks: "Should I still talk to her?" The nurse\'s BEST response is:',opts:['"No, she can no longer hear you."','"Yes — hearing is the LAST sense to be lost. Continue talking, holding her hand, and telling her she is loved."','"Only speak to her if she responds."','"It doesn\'t matter either way."'],ans:1,explain:'"Hearing is the LAST sense to be lost." (Ch. 15 / Ch. 25) Family should be encouraged to continue talking, reading aloud, playing familiar music, and touching the patient — providing comfort and connection in the final hours.'},
{id:66,mod:'m2',obj:'M2 Obj 2',cat:'Nursing Interventions for the Dying Patient',icon:'👩‍⚕️',cc:'#0a8f80',cb:'#e0f5f2',q:'Which statement is THERAPEUTIC when communicating with a dying patient?',opts:['"Don\'t worry — everything will be fine."','"You should make peace with God before it\'s too late."','"I\'m here with you. Is there anything you need right now?"','"I know exactly how you feel."'],ans:2,explain:'Offering presence, asking about immediate needs, and creating space for the patient to express themselves is therapeutic. False reassurance ("everything will be fine"), telling the patient what to do spiritually, and claiming to know their feelings are all non-therapeutic. (Ch. 15 / Ch. 25)'},
{id:67,mod:'m2',obj:'M2 Obj 3',cat:'Physical Signs of the Near-Death Patient',icon:'⚠️',cc:'#d0312d',cb:'#fde8e8',q:'Which are signs and symptoms of IMMINENT death from Ch. 25? (Select ALL that apply)',opts:['Pupils dilated and fixed','Cheyne-Stokes respirations','Pulse weaker and more rapid','Blood pressure continues to fall','Profuse diaphoresis (sweating)'],ans:[0,1,2,3,4],multi:true,explain:'All five listed in Ch. 25 Slide 14 as signs of imminent death. Additional signs: skin cool and clammy, death rattle (noisy respirations). Remember: hearing is the LAST sense lost — continue talking to the patient.'},
{id:68,mod:'m2',obj:'M2 Obj 3',cat:'Physical Signs of the Near-Death Patient',icon:'⚠️',cc:'#d0312d',cb:'#fde8e8',q:'The "death rattle" is caused by:',opts:['The cardiac monitor going flat','Noisy respirations from secretions the patient can no longer clear from the throat','A painful response to hypoxia','A sudden drop in blood pressure'],ans:1,explain:'"Death rattle: noisy respirations" (Ch. 25 Slide 14) caused by pooling secretions in the throat. It is a normal sign of dying — reassure the family it is not painful for the patient. It is one of the most distressing signs for families to witness.'},
{id:69,mod:'m2',obj:'M2 Obj 3',cat:'Physical Signs of the Near-Death Patient',icon:'⚠️',cc:'#d0312d',cb:'#fde8e8',q:'Cheyne-Stokes respirations are characterized by:',opts:['Rapid, constant breathing at 30 breaths/minute','Alternating periods of deep breathing and apnea (no breathing)','Shallow, quiet breathing that gradually stops','Loud, labored breathing with accessory muscle use'],ans:1,explain:'Cheyne-Stokes respirations = alternating periods of deep breathing and apnea. Caused by failing CNS regulation of breathing as the brain stem deteriorates near death. (Ch. 25 Slide 14 / Ch. 15 textbook)'},
{id:70,mod:'m2',obj:'M2 Obj 3',cat:'Physical Signs of the Near-Death Patient',icon:'⚠️',cc:'#d0312d',cb:'#fde8e8',q:'Which are the CLINICAL SIGNS of death listed in Ch. 25? (Select ALL that apply)',opts:['Unreceptivity and unresponsiveness','No movement or breathing','No reflexes','Flat electroencephalogram (EEG)','Absence of apical pulse'],ans:[0,1,2,3,4],multi:true,explain:'All five listed in Ch. 25 Slide 15 as clinical signs of death. Plus: cessation of respirations. A flat EEG indicates absence of electrical brain activity. These criteria are used in clinical determination of death.'},
{id:71,mod:'m2',obj:'M2 Obj 3',cat:'Physical Signs of the Near-Death Patient',icon:'⚠️',cc:'#d0312d',cb:'#fde8e8',q:'A hospice patient\'s extremities become cold and mottled (blotchy). The nurse recognizes this as:',opts:['A sign of infection requiring antibiotics','Blood pooling away from the limbs as circulation fails — a sign of imminent death','A medication side effect requiring IV fluids','Normal skin changes unrelated to dying'],ans:1,explain:'Cold, mottled extremities indicate circulatory failure — blood pooling away from the limbs as the heart weakens. Listed in Ch. 15 as a sign of impending death. The nurse should prepare the family and ensure comfort measures are in place.'},
{id:72,mod:'m2',obj:'M2 Obj 3',cat:'Physical Signs of the Near-Death Patient',icon:'⚠️',cc:'#d0312d',cb:'#fde8e8',q:'Which pupillary change is a sign of imminent death?',opts:['Pupils become small and reactive to light','Pupils become DILATED and FIXED (non-reactive)','Pupils become unequal in size','Pupils show rapid back-and-forth movement'],ans:1,explain:'"Pupils dilated and fixed" (Ch. 25 Slide 14) — fixed, dilated pupils indicate loss of brain stem reflexes. They are both a sign of imminent death AND a clinical sign of death. (Ch. 25 Slides 14 & 15)'},
{id:73,mod:'m2',obj:'M2 Obj 4',cat:'Postmortem Care',icon:'🕯️',cc:'#6b3fa0',cb:'#f0ebfc',q:'Postmortem care is defined as:',opts:['Spiritual support given in the final hours','Care of the patient\'s BODY after death','Grief counseling provided to the family after death','Documentation completed after a patient dies'],ans:1,explain:'Postmortem care = "care of the patient\'s body after death." It is the nurse\'s responsibility and should be performed as soon as possible after death to prevent tissue damage or disfigurement. (Ch. 25 Slide 16)'},
{id:74,mod:'m2',obj:'M2 Obj 4',cat:'Postmortem Care',icon:'🕯️',cc:'#6b3fa0',cb:'#f0ebfc',q:'Why should the body be cared for as soon as possible after death?',opts:['To allow the family to view the body immediately','To prevent tissue damage or disfigurement','To comply with hospital billing requirements','To notify the organ donation team first'],ans:1,explain:'"The body should be cared for as soon as possible after death to prevent tissue damage or disfigurement." (Ch. 25 Slide 16) Rigor mortis begins within 2–6 hours. Prompt, dignified postmortem care demonstrates respect for the patient.'},
{id:75,mod:'m2',obj:'M2 Obj 4',cat:'Postmortem Care',icon:'🕯️',cc:'#6b3fa0',cb:'#f0ebfc',q:'When preparing the body for family viewing, the nurse should:',opts:['Restrict family access until the funeral home arrives','Prepare the body and room to minimize stress — make the body look as natural and comfortable as possible','Require all family members to leave the facility','Not allow any cultural or religious rituals'],ans:1,explain:'"Offer the family the opportunity to view the body. Before the family views the body, prepare it and the room to minimize the stress. The body should be made to look as natural and comfortable as possible." (Ch. 25 Slide 16)'},
{id:76,mod:'m2',obj:'M2 Obj 4',cat:'Postmortem Care',icon:'🕯️',cc:'#6b3fa0',cb:'#f0ebfc',q:'Postmortem care nursing responsibilities include: (Select ALL that apply)',opts:['Respectfully cleaning and positioning the body','Following cultural and religious practices related to the body','Offering the family the opportunity to view and be present','Notifying appropriate personnel (physician, chaplain, social work)','Completing required documentation'],ans:[0,1,2,3,4],multi:true,explain:'All five are postmortem nursing responsibilities. Cultural/religious practices vary widely — the nurse must be culturally competent and accommodate meaningful rituals. This period is the family\'s last opportunity to be with their loved one. (Ch. 25 / Ch. 15)'},
{id:77,mod:'m2',obj:'M2 Obj 5',cat:'The Grieving Family',icon:'👨‍👩‍👧',cc:'#2d4a6e',cb:'#e8eef8',q:'The needs of the grieving family should be met by:',opts:['Only the hospital chaplain','A caring, compassionate health-care provider — the nurse plays an active role in family grief support','Only professional grief counselors','Delegating all family support to the social worker'],ans:1,explain:'"The needs of the grieving family and significant others should be met by a caring, compassionate health care provider." (Ch. 25 Slide 17) Nurses have a PRIMARY role in family grief support.'},
{id:78,mod:'m2',obj:'M2 Obj 5',cat:'The Grieving Family',icon:'👨‍👩‍👧',cc:'#2d4a6e',cb:'#e8eef8',q:'Resolution of grief begins when the grieving person can: (Select ALL that apply)',opts:['Have positive interactions with others','Participate in support groups','Establish goals and work to achieve them','Discuss the meaning of the loss and its effect','Forget about the deceased entirely and move on'],ans:[0,1,2,3],explain:'"Resolution begins when the grieving person can: have positive interactions, participate in support groups, establish goals and work to achieve them, discuss the meaning of the loss and its effect." (Ch. 25 Slide 17) Grief resolution does NOT mean forgetting.'},
{id:79,mod:'m2',obj:'M2 Obj 5',cat:'The Grieving Family',icon:'👨‍👩‍👧',cc:'#2d4a6e',cb:'#e8eef8',q:'Hospice provides bereavement support to the family:',opts:['Only on the day of the patient\'s death','For an extended period after death — because facing the future without the deceased is difficult even when expected','Until the funeral is completed','Only if the family requests it in writing'],ans:1,explain:'"Support is provided by the hospice for an extended period after the death. Even though the family feels they have prepared, facing the future without the person who died is difficult." (Ch. 40 Slide 11) Typically continues 13 months after death.'},
{id:80,mod:'m2',obj:'M2 Obj 5',cat:'The Grieving Family',icon:'👨‍👩‍👧',cc:'#2d4a6e',cb:'#e8eef8',q:'A spouse is crying alone after their partner\'s death. The BEST therapeutic response is:',opts:['"You\'ll feel better soon — time heals everything."','"I know exactly how you feel."','"I\'m so sorry for your loss. Would you like to come sit somewhere quiet? I\'m here with you."','"Your partner is in a better place now."'],ans:2,explain:'Offering presence, acknowledging the loss, and inviting quiet support is therapeutic. "You\'ll feel better" and "better place" minimize grief. "I know how you feel" invalidates their unique experience. (Ch. 15 — Table 15.2 / Ch. 16 — Table 16.2)'},
{id:81,mod:'m2',obj:'M2 Obj 5',cat:'The Grieving Family',icon:'👨‍👩‍👧',cc:'#2d4a6e',cb:'#e8eef8',q:'Which statements are THERAPEUTIC when supporting a bereaved family? (Select ALL that apply)',opts:['"Tell me about the person you lost."','"It\'s okay to cry."','"Grieving takes time. There is no rush."','"Don\'t feel guilty — you did everything you could."','"I\'m here to listen whenever you\'re ready."'],ans:[0,1,2,4],explain:'Therapeutic: open-ended questions (A), validating tears (B), acknowledging grief takes time (C), and offering listening (E). "Don\'t feel guilty" (D) is non-therapeutic — it dismisses a real emotion and tells the person how to feel. (Ch. 15 — Table 15.2 / Ch. 16 — Table 16.2)'},
{id:82,mod:'m2',obj:'M2 Obj 5',cat:'The Grieving Family',icon:'👨‍👩‍👧',cc:'#2d4a6e',cb:'#e8eef8',q:'Nurses ALSO experience grief after patient deaths. Recommended coping strategies include: (Select ALL that apply)',opts:['Understanding the grief process','Appreciating the experience of the dying patient','Using effective listening skills','Acknowledging personal limits','Knowing when to get away and take care of self'],ans:[0,1,2,3,4],multi:true,explain:'All five listed in Ch. 25 Slide 18. Nurses must "come to grips with it." Each hospice also provides "support to their staff with support meetings." (Ch. 40 Slide 11) Unaddressed nurse grief leads to compassion fatigue and burnout.'},
{id:83,mod:'m2',obj:'M2 Unexpected',cat:'Unexpected Response to Therapies',icon:'⚡',cc:'#a0284a',cb:'#fdedf3',q:'A hospice patient expected to die within weeks shows significant unexpected improvement. The nurse should:',opts:['Continue hospice care regardless','Notify the hospice team — the patient may be discharged from hospice if they no longer meet the 6-month prognosis criteria (and can re-enroll if they decline again)','Immediately restart aggressive curative treatment','Document the improvement and take no further action'],ans:1,explain:'Hospice patients CAN improve ("hospice graduation"). If they no longer meet eligibility criteria, they can be discharged — and re-enrolled if condition deteriorates again. The physician must reassess prognosis. (Ch. 40 / Module 2)'},
{id:84,mod:'m2',obj:'M2 Unexpected',cat:'Unexpected Response to Therapies',icon:'⚡',cc:'#a0284a',cb:'#fdedf3',q:'A patient receiving opioids for terminal pain develops increasing confusion and muscle twitching (myoclonus). The nurse recognizes this as:',opts:['Normal expected effects of all opioids requiring no intervention','Possible opioid toxicity — the nurse should report to the physician for medication reassessment','A sign the patient is dying from the disease, not the medication','An expected and untreatable end-stage symptom'],ans:1,explain:'Confusion and myoclonus can indicate opioid toxicity or accumulation of active metabolites. The nurse must report this unexpected response immediately. Opioid rotation (switching to a different opioid) may be needed. (Pharmacology / Palliative nursing)'},
{id:85,mod:'m2',obj:'M2 Unexpected',cat:'Unexpected Response to Therapies',icon:'⚡',cc:'#a0284a',cb:'#fdedf3',q:'A terminal patient becomes MORE agitated (paradoxical reaction) after a benzodiazepine is given. The nurse\'s BEST action is:',opts:['Give another dose of the same medication','Document and wait — this always resolves','Report the paradoxical reaction to the physician for medication reassessment; ensure patient and environment safety','Discontinue ALL medications immediately'],ans:2,explain:'Paradoxical agitation with benzodiazepines (especially in elderly patients) is an unexpected response. The nurse must report it, ensure safety, and collaborate with the physician to reassess the medication regimen. (Pharmacology / Geriatric palliative care)'},
];

function buildAll(){
  const wrap=document.getElementById('qwrap');wrap.innerHTML='';
  OBJS.forEach(ob=>{
    const qs=QS.filter(q=>q.obj===ob.key);if(!qs.length)return;
    const ban=document.createElement('div');ban.className='obj-banner';ban.dataset.ob=ob.key;
    ban.innerHTML=`<div class="ob-icon">${ob.icon}</div><div class="ob-text"><strong>${ob.label}</strong><p>${ob.desc}</p></div><span class="ob-count">${qs.length} Q</span>`;
    wrap.appendChild(ban);
    qs.forEach((q,i)=>wrap.appendChild(buildCard(q,i)));
  });
  document.getElementById('dt').textContent=QS.length;
}

function buildCard(q,qi){
  const c=document.createElement('div');c.className='qc';c.id=`c${q.id}`;c.dataset.mod=q.mod;c.dataset.id=q.id;
  c.style.animationDelay=Math.min(qi*.04,.2)+'s';
  const multi=!!q.multi;
  const opts=q.opts.map((o,i)=>`<button class="opt" onclick="sel(${q.id},${i},${multi})"><span class="ol">${L[i]}</span><span style="flex:1">${o}</span>${multi?'<span class="ochk"></span>':''}</button>`).join('');
  c.innerHTML=`<div class="qh"><span class="qn">${q.id}</span><span class="qtag" style="background:${q.cb};color:${q.cc}">${q.cat}</span>${multi?`<span class="qmb" style="background:${q.cb};color:${q.cc}">SELECT ALL</span>`:''}<span class="qsi" id="si${q.id}"></span></div>
  <div class="qbd">${multi?'<div class="mn">⚠ Select ALL correct answers before submitting</div>':''}<div class="qt">${q.q}</div><div class="opts" id="o${q.id}">${opts}</div></div>
  <div class="rat" id="r${q.id}"><div class="rati"><span class="ri" id="ri${q.id}"></span><div class="rc" id="rc${q.id}"></div></div></div>
  <div class="qft"><button class="subbtn" id="sb${q.id}" onclick="subQ(${q.id})" disabled>Submit <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button><span class="skn" id="hn${q.id}">${multi?'Select all correct answers':'Select an answer to submit'}</span></div>`;
  return c;
}

function sel(qid,idx,multi){
  const s=state[qid]||{};if(s.submitted)return;
  if(multi){s.chosen=s.chosen||[];const p=s.chosen.indexOf(idx);if(p>=0)s.chosen.splice(p,1);else s.chosen.push(idx);document.querySelectorAll(`#o${qid} .opt`).forEach((b,i)=>{b.classList.toggle('sel',s.chosen.includes(i));const ch=b.querySelector('.ochk');if(ch)ch.textContent=s.chosen.includes(i)?'✓':'';});document.getElementById(`hn${qid}`).textContent=s.chosen.length?`${s.chosen.length} selected`:'Select all correct answers';}
  else{s.chosen=idx;document.querySelectorAll(`#o${qid} .opt`).forEach((b,i)=>b.classList.toggle('sel',i===idx));document.getElementById(`hn${qid}`).textContent='';}
  state[qid]=s;document.getElementById(`sb${qid}`).disabled=multi?s.chosen.length===0:false;
}

function subQ(qid){
  const q=QS.find(x=>x.id===qid);const s=state[qid];
  if(!s||s.submitted||s.chosen==null||(Array.isArray(s.chosen)&&!s.chosen.length))return;
  s.submitted=true;
  const multi=!!q.multi;const corr=Array.isArray(q.ans)?q.ans:[q.ans];const chosen=Array.isArray(s.chosen)?s.chosen:[s.chosen];
  const isOk=multi?(JSON.stringify(chosen.slice().sort((a,b)=>a-b))===JSON.stringify(corr.slice().sort((a,b)=>a-b))):chosen[0]===q.ans;
  s.correct=isOk;
  document.querySelectorAll(`#o${qid} .opt`).forEach((b,i)=>{b.disabled=true;b.classList.remove('sel');const ia=corr.includes(i);const ip=chosen.includes(i);if(ia&&ip)b.classList.add('oc');else if(!ia&&ip)b.classList.add('ow');else if(ia&&!ip)b.classList.add('or');const ch=b.querySelector('.ochk');if(ch)ch.textContent=ia?'✓':(ip?'✗':'');});
  document.getElementById(`c${qid}`).classList.add(isOk?'cc':'wc');
  document.getElementById(`si${qid}`).textContent=isOk?'✅':'❌';
  const rat=document.getElementById(`r${qid}`);rat.classList.add(isOk?'rat-c':'rat-w','show');
  document.getElementById(`ri${qid}`).textContent=isOk?'💡':'📖';
  document.getElementById(`rc${qid}`).innerHTML=`<strong>${isOk?'Correct!':'Incorrect — Here\'s Why:'}</strong>${q.explain}`;
  const sb=document.getElementById(`sb${qid}`);sb.disabled=true;sb.innerHTML=isOk?'✔ Correct':'✘ Incorrect';sb.style.background=isOk?'var(--green)':'var(--red)';sb.style.boxShadow='none';
  document.getElementById(`hn${qid}`).textContent='';
  updateDash();applyFilter();
}

function submitAll(){QS.forEach(q=>{const s=state[q.id];if(s&&!s.submitted&&s.chosen!=null)subQ(q.id);});}
function resetAll(){if(!confirm('Reset all answers?'))return;QS.forEach(q=>{delete state[q.id];});buildAll();updateDash();document.getElementById('results-div').style.display='none';window.scrollTo({top:0,behavior:'smooth'});}

function updateDash(){
  const ans=QS.filter(q=>state[q.id]?.submitted).length;const cor=QS.filter(q=>state[q.id]?.correct).length;const pct=Math.round(ans/QS.length*100);
  document.getElementById('dc').textContent=cor;document.getElementById('dw').textContent=ans-cor;document.getElementById('da').textContent=ans;
  document.getElementById('hpf').style.width=pct+'%';document.getElementById('hppl').textContent=pct+'%';
  if(ans===QS.length)showResults(cor,ans-cor);
}

function showResults(cor,wr){
  const pct=Math.round(cor/QS.length*100);const[e,t]=pct>=90?['🏆','Outstanding — Quiz Ready!']:pct>=75?['🎉','Great Work!']:pct>=60?['📚','Keep Reviewing!']:['💪','Don\'t Give Up!'];
  const b=document.getElementById('results-div');b.innerHTML=`<div class="rbe">${e}</div><div class="rbt">${t}</div><div class="rbs">You completed all ${QS.length} questions</div><div class="rbp">${pct}%</div><div class="rbst"><div class="rbc"><strong>${cor}</strong><span>Correct</span></div><div class="rbw"><strong>${wr}</strong><span>Incorrect</span></div></div>`;
  b.style.display='block';b.scrollIntoView({behavior:'smooth',block:'center'});
}

function applyFilter(){
  const f=cf;
  document.querySelectorAll('.qc').forEach(c=>{const qid=+c.dataset.id;const mod=c.dataset.mod;const s=state[qid]||{};let show=true;if(f==='m1')show=mod==='m1';else if(f==='m2')show=mod==='m2';else if(f==='eaq25')show=mod==='eaq25';else if(f==='eaq40')show=mod==='eaq40';else if(f==='unanswered')show=!s.submitted;else if(f==='wrong')show=s.submitted&&!s.correct;c.style.display=show?'':'none';});
  document.querySelectorAll('.obj-banner').forEach(b=>{const ob=b.dataset.ob;const any=[...document.querySelectorAll('.qc')].some(c=>{const q=QS.find(x=>x.id===+c.dataset.id);return q&&q.obj===ob&&c.style.display!=='none';});b.style.display=any?'':'none';});
}

document.querySelectorAll('.fc').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.fc').forEach(b=>b.classList.remove('on'));btn.classList.add('on');cf=btn.dataset.f;applyFilter();});});
